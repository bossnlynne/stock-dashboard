<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000;--surface:#0a0a0a;--surface2:#111;--border:#1a1a1a;
  --text:#fafafa;--dim:#71717a;--profit:#f85149;--loss:#3fb950;
  --accent:#a1a1aa;--warn:#d29922;--del:#f85149;--radius:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;letter-spacing:-0.01em}
a{color:var(--text);text-decoration:underline;text-underline-offset:2px}
input,select{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:8px 12px;font-size:13px;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:#555}
button{cursor:pointer;border:none;border-radius:var(--radius);font-size:13px;padding:8px 16px;transition:all .15s}
.btn-primary{background:#fff;color:#000;font-weight:600}
.btn-primary:hover{background:#e4e4e7}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--surface2);border-color:#333}
.btn-danger{background:transparent;border:none;color:var(--del);padding:2px 6px;font-size:12px}
.btn-danger:hover{color:#ff7b72}
.btn-icon{background:transparent;border:none;color:var(--dim);padding:4px 8px;font-size:16px}
.btn-icon:hover{color:var(--text)}

/* Header */
#header{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
#header h1{font-size:16px;font-weight:600;color:var(--text);flex:1;min-width:160px;letter-spacing:-0.02em}
.rate-control{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--dim)}
.rate-control label{white-space:nowrap}
.rate-control input{width:80px}
#refresh-btn{display:flex;align-items:center;gap:6px}
#last-update{font-size:11px;color:var(--dim)}
.spinning{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Tab bar */
#tab-bar{display:flex;gap:0;padding:0 24px;border-bottom:1px solid rgba(255,255,255,.06);background:var(--bg)}
.tab-btn{background:none;border:none;color:var(--dim);font-size:14px;font-weight:500;padding:14px 20px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;border-radius:0}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Summary cards */
#summary{display:flex;gap:12px;padding:20px 24px;flex-wrap:wrap}
.summary-card{flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px}
.summary-card .label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.summary-card .value{font-size:20px;font-weight:700}
.summary-card .sub{font-size:11px;color:var(--dim);margin-top:4px}

/* Portfolio sections */
.portfolio-section{margin:0 24px 20px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.section-header{background:var(--surface);padding:14px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.section-header .icon{font-size:16px}
.section-header .title{flex:1;font-weight:600;font-size:14px}
.section-header .sect-summary{font-size:12px;color:var(--dim);margin-right:8px}
.section-header .toggle{color:var(--dim);transition:.2s}
.section-body{display:none}
.section-body.open{display:block}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface);color:var(--dim);font-weight:500;text-align:right;padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child,th:nth-child(2){text-align:left}
td{padding:10px 14px;border-bottom:1px solid var(--border);text-align:right;vertical-align:middle;white-space:nowrap}
td:first-child,td:nth-child(2){text-align:left}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.symbol{font-weight:600;color:var(--text)}
.name{color:var(--dim);font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.profit{color:var(--profit)}
.loss{color:var(--loss)}
.neutral{color:var(--dim)}
.price-loading{color:var(--dim);font-style:italic}
.editable{cursor:pointer;border-bottom:1px dashed var(--border);padding-bottom:1px}
.editable:hover{border-bottom-color:#555}
.edit-input{background:var(--surface2);border:1px solid #555;color:var(--text);border-radius:4px;padding:2px 6px;font-size:13px;width:90px;outline:none;text-align:right}
.section-add{padding:12px 18px;background:var(--surface)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:600}
.modal-body{padding:22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.add-rows{display:flex;flex-direction:column;gap:8px}
.add-row{display:grid;grid-template-columns:1fr 1.5fr 1fr 1fr auto;gap:8px;align-items:start}
.add-row .field{display:flex;flex-direction:column;gap:3px}
.add-row .field label{font-size:11px;color:var(--dim)}
.add-row .field input{width:100%}
.search-wrap{position:relative}
.search-dropdown{position:absolute;top:100%;left:0;right:0;z-index:300;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);max-height:200px;overflow-y:auto;margin-top:2px}
.search-item{padding:8px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border)}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:var(--surface)}
.search-item .si-symbol{font-weight:600;color:var(--text)}
.search-item .si-name{color:var(--dim);margin-left:6px}
.add-more-btn{color:var(--dim);background:none;border:1px dashed var(--border);width:100%;padding:8px;border-radius:var(--radius)}
.add-more-btn:hover{border-color:#555;color:var(--text)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;z-index:999;font-size:13px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}}

/* Empty state */
.empty-state{padding:32px;text-align:center;color:var(--dim)}

/* ─── Calculator ─────────────────────────────────────── */
.calc-container{max-width:920px;margin:0 auto;padding:24px}
.calc-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.calc-header h2{font-size:24px;font-weight:700;flex:1;letter-spacing:-0.02em}
.market-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.toggle-btn{background:none;border:none;color:var(--dim);padding:8px 22px;font-size:13px;cursor:pointer;transition:.15s;border-radius:0}
.toggle-btn.active{background:#fff;color:#000;font-weight:600}
.calc-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:20px;overflow:hidden}
.calc-section-title{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;font-weight:600;font-size:15px;border-bottom:1px solid var(--border)}
.calc-section-title .add-more-btn{width:auto;padding:6px 14px;margin:0;font-size:12px}
.calc-rows{padding:16px 18px}
.calc-rows:empty::after{content:'點擊「+ 新增」加入項目';display:block;text-align:center;color:var(--dim);padding:20px;font-size:13px}
.calc-row{display:grid;grid-template-columns:120px 1fr 100px 120px 1fr auto;gap:12px;align-items:end;padding:10px 0;border-bottom:1px solid var(--border)}
.calc-row:last-child{border-bottom:none}
.calc-row .field{display:flex;flex-direction:column;gap:4px}
.calc-row .field label{font-size:11px;color:var(--dim)}
.calc-row .field input{width:100%}
.calc-row .result-col{display:flex;flex-direction:column;gap:2px}
.calc-row .result-val{font-size:15px;font-weight:600;text-align:right}
.calc-row .fee-detail{font-size:11px;color:var(--dim);text-align:right}
.calc-section-total{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-top:1px solid var(--border);font-weight:600;font-size:16px;background:rgba(255,255,255,.02)}
.calc-summary{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;text-align:center}
.calc-summary-label{font-size:13px;color:var(--dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.calc-summary-value{font-size:32px;font-weight:700;letter-spacing:-0.02em}
.calc-summary-msg{font-size:14px;margin-top:10px}
.calc-not-found{color:var(--warn);font-size:11px;margin-top:2px}

/* ─── Notes ─────────────────────────────────── */
.notes-container{max-width:920px;margin:0 auto;padding:24px}
.notes-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.notes-header h2{font-size:24px;font-weight:700;flex:1;letter-spacing:-0.02em}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
.note-card:hover{border-color:#333}
.note-card .note-date{font-size:11px;color:var(--dim);letter-spacing:.3px}
.note-card .note-body{font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word;flex:1;min-height:40px}
.note-card .note-actions{display:flex;gap:6px;justify-content:flex-end;opacity:0;transition:opacity .15s}
.note-card:hover .note-actions{opacity:1}
.note-empty{text-align:center;color:var(--dim);padding:60px 20px;font-size:14px}
.note-editor{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:20px}
.note-editor textarea{width:100%;background:transparent;border:none;color:var(--text);font-size:14px;line-height:1.65;resize:vertical;min-height:80px;outline:none;font-family:inherit}
.note-editor textarea::placeholder{color:var(--dim)}
.note-editor-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}

/* Responsive */
@media(max-width:600px){
  #header{padding:10px 14px}
  #summary{padding:14px}
  .portfolio-section{margin:0 14px 16px}
  th,td{padding:8px 10px}
  .add-row{grid-template-columns:1fr 1fr;gap:6px}
  .calc-container{padding:14px}
  .calc-row{grid-template-columns:1fr 1fr 1fr;gap:8px}
  .notes-container{padding:14px}
  .notes-grid{grid-template-columns:1fr}
  .note-card .note-actions{opacity:1}
}
</style>
</head>
<body>

<div id="header">
  <h1>Lynne's Stock Dashboard</h1>
  <div class="rate-control">
    <label>USD/TWD</label>
    <input type="number" id="rate-input" value="32.5" step="0.1" min="1" style="width:82px">
  </div>
  <button class="btn-ghost" id="refresh-btn" onclick="doRefresh()">
    <span id="refresh-icon">&#x27F3;</span> 更新報價
  </button>
  <div id="last-update"></div>
</div>

<div id="tab-bar">
  <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">持股總覽</button>
  <button class="tab-btn" data-tab="calculator" onclick="switchTab('calculator')">損益試算</button>
  <button class="tab-btn" data-tab="notes" onclick="switchTab('notes')">投資備忘錄</button>
</div>

<!-- ═══ Tab 1: Dashboard ═══ -->
<div id="tab-dashboard" class="tab-content active" style="display:block">

<div id="summary">
  <div class="summary-card">
    <div class="label">台股市值</div>
    <div class="value" id="s-tw-val">—</div>
  </div>
  <div class="summary-card">
    <div class="label">美股市值 (TWD)</div>
    <div class="value" id="s-us-val">—</div>
  </div>
  <div class="summary-card">
    <div class="label">總市值</div>
    <div class="value" id="s-total-val">—</div>
  </div>
  <div class="summary-card">
    <div class="label">總損益 (TWD)</div>
    <div class="value" id="s-pnl">—</div>
    <div class="sub" id="s-pnl-pct"></div>
  </div>
</div>

<!-- 台股 -->
<div class="portfolio-section" id="sec-tw">
  <div class="section-header" onclick="toggleSection('tw')">
    <span class="icon">&#x1F1F9;&#x1F1FC;</span>
    <span class="title">台股</span>
    <span class="sect-summary" id="sect-sum-tw"></span>
    <span class="toggle" id="toggle-tw">&#x25BC;</span>
  </div>
  <div class="section-body open" id="body-tw">
    <div class="table-wrap">
      <table id="table-tw"><thead><tr>
        <th>代號</th><th>名稱</th><th>股數</th><th>成本/股(TWD)</th><th>現價(TWD)</th><th>市值(TWD)</th><th>損益(TWD)</th><th>損益%</th><th></th>
      </tr></thead><tbody id="tbody-tw"></tbody></table>
    </div>
    <div class="section-add">
      <button class="btn-primary" onclick="openModal('tw')">&#xFF0B; 新增台股</button>
    </div>
  </div>
</div>

<!-- 台幣複委託美股 -->
<div class="portfolio-section" id="sec-twdUs">
  <div class="section-header" onclick="toggleSection('twdUs')">
    <span class="icon">&#x1F310;</span>
    <span class="title">台幣複委託美股</span>
    <span class="sect-summary" id="sect-sum-twdUs"></span>
    <span class="toggle" id="toggle-twdUs">&#x25BC;</span>
  </div>
  <div class="section-body open" id="body-twdUs">
    <div class="table-wrap">
      <table id="table-twdUs"><thead><tr>
        <th>代號</th><th>名稱</th><th>股數</th><th>成本/股(USD)</th><th>現價(USD)</th><th>市值(USD)</th><th>市值(TWD)</th><th>損益(USD)</th><th>損益%</th><th></th>
      </tr></thead><tbody id="tbody-twdUs"></tbody></table>
    </div>
    <div class="section-add">
      <button class="btn-primary" onclick="openModal('twdUs')">&#xFF0B; 新增台幣複委託美股</button>
    </div>
  </div>
</div>

<!-- 外幣複委託美股 -->
<div class="portfolio-section" id="sec-usdUs">
  <div class="section-header" onclick="toggleSection('usdUs')">
    <span class="icon">&#x1F4B5;</span>
    <span class="title">外幣複委託美股 (USD)</span>
    <span class="sect-summary" id="sect-sum-usdUs"></span>
    <span class="toggle" id="toggle-usdUs">&#x25BC;</span>
  </div>
  <div class="section-body open" id="body-usdUs">
    <div class="table-wrap">
      <table id="table-usdUs"><thead><tr>
        <th>代號</th><th>名稱</th><th>股數</th><th>成本/股(USD)</th><th>現價(USD)</th><th>市值(USD)</th><th>損益(USD)</th><th>損益%</th><th></th>
      </tr></thead><tbody id="tbody-usdUs"></tbody></table>
    </div>
    <div class="section-add">
      <button class="btn-primary" onclick="openModal('usdUs')">&#xFF0B; 新增外幣複委託美股</button>
    </div>
  </div>
</div>

</div><!-- /tab-dashboard -->

<!-- ═══ Tab 2: Calculator ═══ -->
<div id="tab-calculator" class="tab-content" style="display:none">
<div class="calc-container">

  <div class="calc-header">
    <h2>損益試算</h2>
    <div class="market-toggle">
      <button class="toggle-btn active" data-market="tw" onclick="switchMarket('tw')">台股</button>
      <button class="toggle-btn" data-market="us" onclick="switchMarket('us')">美股</button>
    </div>
    <button class="btn-ghost" onclick="importFromPortfolio()">匯入持股</button>
  </div>

  <!-- Sell -->
  <div class="calc-section">
    <div class="calc-section-title">
      <span>賣出</span>
      <button class="add-more-btn" onclick="addCalcRow('sell')">&#xFF0B; 新增</button>
    </div>
    <div class="calc-rows" id="sell-rows"></div>
    <div class="calc-section-total">
      <span>賣出淨回合計</span>
      <span id="sell-total-val">0</span>
    </div>
  </div>

  <!-- Buy -->
  <div class="calc-section">
    <div class="calc-section-title">
      <span>買入</span>
      <button class="add-more-btn" onclick="addCalcRow('buy')">&#xFF0B; 新增</button>
    </div>
    <div class="calc-rows" id="buy-rows"></div>
    <div class="calc-section-total">
      <span>買進總額合計</span>
      <span id="buy-total-val">0</span>
    </div>
  </div>

  <!-- Summary -->
  <div class="calc-summary">
    <div class="calc-summary-label">差額</div>
    <div class="calc-summary-value" id="calc-diff">—</div>
    <div class="calc-summary-msg" id="calc-msg"></div>
  </div>

</div>
</div><!-- /tab-calculator -->

<!-- ═══ Tab 3: Notes ═══ -->
<div id="tab-notes" class="tab-content" style="display:none">
<div class="notes-container">

  <div class="notes-header">
    <h2>投資備忘錄</h2>
    <button class="btn-primary" onclick="showNoteEditor()">新增備忘</button>
  </div>

  <div class="note-editor" id="note-editor" style="display:none">
    <textarea id="note-input" placeholder="寫下你的投資筆記..." rows="3"></textarea>
    <div class="note-editor-footer">
      <button class="btn-ghost" onclick="cancelNoteEditor()">取消</button>
      <button class="btn-primary" onclick="saveNote()">儲存</button>
    </div>
  </div>

  <div id="notes-list"></div>

</div>
</div><!-- /tab-notes -->

<!-- Add Modal (Dashboard) -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">新增持股</h3>
      <button class="btn-icon" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="add-rows" id="add-rows"></div>
      <button class="add-more-btn" onclick="addRowToModal()">&#xFF0B; 再加一筆</button>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="submitModal()">確認新增</button>
    </div>
  </div>
</div>

// ─── Tab switching ─────────────────────────────────────────────────
function switchTab(tabId) {

    c.style.display = isActive ? 'block' : 'none';
  });
}

// ─── Crypto helpers (localStorage encryption) ──────────────────────
const LS_SALT = 'sdb_salt_2024';
async function getCryptoKey(password) {
  if (_cryptoKey) return _cryptoKey;
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  _cryptoKey = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:enc.encode(LS_SALT), iterations:100000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
  return _cryptoKey;
}
function uint8ToBase64(bytes) {
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function base64ToUint8(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
async function encryptData(obj, password) {
  const key = await getCryptoKey(password);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(obj)));
  const out = new Uint8Array(iv.length + ct.byteLength);
  out.set(iv); out.set(new Uint8Array(ct), iv.length);
  return uint8ToBase64(out);
}
async function decryptData(b64, password) {
  const key = await getCryptoKey(password);
  const raw = base64ToUint8(b64);
  const iv = raw.slice(0, 12);
  const ct = raw.slice(12);
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

// ─── Persistence ───────────────────────────────────────────────────
let _pwd = null;
async function saveState() {
  try {
    if (_pwd) {
      const enc = await encryptData(state, _pwd);
      localStorage.setItem(LS_KEY, enc);
    } else {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    }
  } catch(e) { console.error('save err', e); }
}
async function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    let loaded;
    if (_pwd) {
      try { loaded = await decryptData(raw, _pwd); }
      catch { loaded = JSON.parse(raw); }
    } else { loaded = JSON.parse(raw); }
    if (loaded && loaded.portfolios) {
      state = Object.assign({}, state, loaded);
      state.portfolios.tw = state.portfolios.tw || [];
      state.portfolios.twdUs = state.portfolios.twdUs || [];
      state.portfolios.usdUs = state.portfolios.usdUs || [];
      state.notes = state.notes || [];
    }
  } catch(e) { console.error('load err', e); }
}

// ─── Price fetching ─────────────────────────────────────────────────
let twDataCache = null;
async function loadTWData() {
  if (twDataCache) return twDataCache;
  twDataCache = {};
  const TPEX_PROXY = 'https://api.codetabs.com/v1/proxy/?quest=https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes';
  const [r1, r2] = await Promise.allSettled([
    fetch('https://www.twse.com.tw/rwd/zh/afterTrading/STOCK_DAY_ALL?response=json', { signal: AbortSignal.timeout(10000) }).then(r => r.json()),
    fetch(TPEX_PROXY, { signal: AbortSignal.timeout(10000) }).then(r => r.json())
  ]);
  if (r1.status === 'fulfilled' && Array.isArray(r1.value?.data)) {
    r1.value.data.forEach(row => {
      const sym = row[0];
      if (!sym) return;
      const p = parseFloat((row[7] || '').replace(/,/g, ''));
      twDataCache[sym] = { name: row[1] || '', price: (p && !isNaN(p)) ? p : null };
    });
  }
  if (r2.status === 'fulfilled' && Array.isArray(r2.value)) {
    r2.value.forEach(item => {
      const sym = item['SecuritiesCompanyCode'];
      if (!sym) return;
      const p = parseFloat((item['Close'] || '').replace(/,/g, ''));
      twDataCache[sym] = { name: item['CompanyName'] || '', price: (p && !isNaN(p)) ? p : null };
    });
  }
  return twDataCache;
}

async function fetchTWPrices(symbols) {
  if (!symbols.length) return;
  const cache = await loadTWData();
  symbols.forEach(sym => {
    const d = cache[sym];
    if (!d) return;
    if (d.price) prices[sym] = d.price;
    if (d.name) state.portfolios.tw.forEach(h => { if (h.symbol === sym && !h.name) h.name = d.name; });
  });
}

async function fetchUSPrices(symbols) {
  if (!symbols.length) return;
  const fetches = symbols.map(sym =>
    fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FINNHUB_KEY}`, { signal: AbortSignal.timeout(8000) })
      .then(r => r.json())
      .then(d => { if (d.c) prices[sym] = d.c; })
      .catch(() => {})
  );
  await Promise.allSettled(fetches);
}

async function fetchExchangeRate() {
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/USD', { signal: AbortSignal.timeout(6000) });
    const data = await res.json();
    const rate = data?.rates?.TWD;
    if (rate && !isNaN(rate)) {
      state.exchangeRate = Math.round(rate * 100) / 100;
      document.getElementById('rate-input').value = state.exchangeRate;
    }
  } catch(e) {}
}

async function fetchAllPrices() {
  const twSyms = [...new Set(state.portfolios.tw.map(h => h.symbol))];
  const usSyms = [...new Set([
    ...state.portfolios.twdUs.map(h => h.symbol),
    ...state.portfolios.usdUs.map(h => h.symbol)
  ])];
  setRefreshSpin(true);
  await Promise.allSettled([fetchExchangeRate(), fetchTWPrices(twSyms), fetchUSPrices(usSyms)]);
  lastUpdated = new Date();
  setRefreshSpin(false);
  renderAll();
}

function setRefreshSpin(on) {
  document.getElementById('refresh-icon').className = on ? 'spinning' : '';
  document.getElementById('refresh-icon').textContent = '\u27F3';
}

async function doRefresh() {
  clearInterval(refreshTimer);
  await fetchAllPrices();
  refreshTimer = setInterval(fetchAllPrices, REFRESH_INTERVAL);
}

// ─── Taiwan stock lookup & search ───────────────────────────────────
async function lookupTWStock(code) {
  const cache = await loadTWData();
  const d = cache[code];
  if (d) return { symbol: code, name: d.name };
  return null;
}

async function searchTWStocks(q) {
  if (!q || q.length < 1) return [];
  const cache = await loadTWData();
  const ql = q.toLowerCase();
  return Object.entries(cache)
    .filter(([sym, d]) => sym.startsWith(q) || d.name.includes(q) || sym.toLowerCase().includes(ql))
    .slice(0, 10)
    .map(([symbol, d]) => ({ symbol, name: d.name }));
}

// ─── US stock search (Finnhub) ───────────────────────────────────────
async function searchUSStocks(q) {
  if (!q || q.length < 1) return [];
  try {
    const res = await fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(q)}&token=${FINNHUB_KEY}`, { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    return (data.result || []).filter(r => r.type === 'Common Stock' || r.type === 'ETP').slice(0, 10).map(r => ({
      symbol: r.symbol, name: r.description
    }));
  } catch(e) { return []; }
}

// ─── Calculations ────────────────────────────────────────────────────
function fmtNum(n, dec=0) {
  if (n == null || isNaN(n)) return '—';
  return n.toLocaleString('zh-TW', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function fmtShares(n, isUs=false) {
  if (n == null || isNaN(n)) return '—';
  if (!isUs) return n.toLocaleString('zh-TW', { maximumFractionDigits: 0 });
  return parseFloat(n.toFixed(5)).toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: 5 });
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function pnlClass(n) {
  if (!n || n === 0) return 'neutral';
  return n > 0 ? 'profit' : 'loss';
}

function calcTW(h) {
  const price = prices[h.symbol];
  const value = price != null ? price * h.shares : null;
  const cost = h.cost * h.shares;
  const pnl = value != null ? value - cost : null;
  const pct = pnl != null ? (pnl / cost) * 100 : null;
  return { price, value, cost, pnl, pct };
}
function calcTWDUS(h, rate) {
  const price = prices[h.symbol];
  const costUSD = h.cost * h.shares;
  const valueUSD = price != null ? price * h.shares : null;
  const valueTWD = valueUSD != null ? valueUSD * rate : null;
  const pnlUSD = valueUSD != null ? valueUSD - costUSD : null;
  const pct = pnlUSD != null ? (pnlUSD / costUSD) * 100 : null;
  return { price, valueUSD, valueTWD, costUSD, pnlUSD, pct };
}
function calcUSDUS(h) {
  const price = prices[h.symbol];
  const valueUSD = price != null ? price * h.shares : null;
  const costUSD = h.cost * h.shares;
  const pnl = valueUSD != null ? valueUSD - costUSD : null;
  const pct = pnl != null ? (pnl / costUSD) * 100 : null;
  return { price, valueUSD, costUSD, pnl, pct };
}

// ─── Rendering ────────────────────────────────────────────────────────
function renderAll() {

  } else {

      if (value != null) { twTotalVal += value; twTotalCost += cost; }
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="symbol">${h.symbol}</span></td>
        <td><span class="name" title="${h.name||''}">${h.name||'—'}</span></td>

        <td>${value != null ? fmtNum(value) : '—'}</td>
        <td class="${pnlClass(pnl)}">${pnl != null ? (pnl>=0?'+':'')+fmtNum(pnl) : '—'}</td>

  } else {
    state.portfolios.twdUs.forEach((h, i) => {

      const costTWD = costUSD * rate;
      if (valueTWD != null) { usTotalValTWD += valueTWD; usTotalCostTWD += costTWD; }
      else { usTotalCostTWD += costTWD; }
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="symbol">${h.symbol}</span></td>
        <td><span class="name" title="${h.name||''}">${h.name||'—'}</span></td>
        <td><span class="editable" onclick="editCell(this,'twdUs',${i},'shares',true)">${fmtShares(h.shares, true)}</span></td>
        <td><span class="editable" onclick="editCell(this,'twdUs',${i},'cost',true)">$${fmtNum(h.cost, 2)}</span></td>
        <td class="${price ? '' : 'price-loading'}">${price ? '$'+fmtNum(price,2) : '載入中'}</td>
        <td>${valueUSD != null ? '$'+fmtNum(valueUSD,2) : '—'}</td>
        <td>${valueTWD != null ? fmtNum(valueTWD) : '—'}</td>
        <td class="${pnlClass(pnlUSD)}">${pnlUSD != null ? (pnlUSD>=0?'+$':'-$')+fmtNum(Math.abs(pnlUSD),2) : '—'}</td>
        <td class="${pnlClass(pct)}">${fmtPct(pct)}</td>
        <td><button class="btn-danger" onclick="removeHolding('twdUs',${i})">&#x2715;</button></td>`;
      twdUsBody.appendChild(tr);
    });
  }

  // USD US
  const usdUsBody = document.getElementById('tbody-usdUs');
  usdUsBody.innerHTML = '';
  if (!state.portfolios.usdUs.length) {
    usdUsBody.innerHTML = '<tr><td colspan="9" class="empty-state">尚無持股，點擊新增</td></tr>';
  } else {
    state.portfolios.usdUs.forEach((h, i) => {
      const { price, valueUSD, costUSD, pnl, pct } = calcUSDUS(h);
      const valTWD = valueUSD != null ? valueUSD * rate : null;
      const costTWD = costUSD * rate;
      if (valTWD != null) { usTotalValTWD += valTWD; usTotalCostTWD += costTWD; }
      else { usTotalCostTWD += costTWD; }
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="symbol">${h.symbol}</span></td>
        <td><span class="name" title="${h.name||''}">${h.name||'—'}</span></td>
        <td><span class="editable" onclick="editCell(this,'usdUs',${i},'shares',true)">${fmtShares(h.shares, true)}</span></td>
        <td><span class="editable" onclick="editCell(this,'usdUs',${i},'cost',true)">$${fmtNum(h.cost,2)}</span></td>
        <td class="${price ? '' : 'price-loading'}">${price ? '$'+fmtNum(price,2) : '載入中'}</td>
        <td>${valueUSD != null ? '$'+fmtNum(valueUSD,2) : '—'}</td>
        <td class="${pnlClass(pnl)}">${pnl != null ? (pnl>=0?'+$':'-$')+fmtNum(Math.abs(pnl),2) : '—'}</td>

    });

  const usPnl = usTotalValTWD - usTotalCostTWD;
  const totalVal = twTotalVal + usTotalValTWD;
  const totalCost = twTotalCost + usTotalCostTWD;
  const totalPnl = totalVal - totalCost;
  const totalPct = totalCost ? (totalPnl / totalCost) * 100 : 0;

  pnlEl.className = 'value ' + pnlClass(totalPnl);
  document.getElementById('s-pnl-pct').innerHTML = totalPct ? `<span class="${pnlClass(totalPnl)}">${fmtPct(totalPct)}</span>` : '';

  if (lastUpdated) {
    document.getElementById('last-update').textContent = `更新 ${lastUpdated.toLocaleTimeString('zh-TW')}`;
  }
}

let rowCount = 0;
function openModal(type) {
  currentModalType = type;
  rowCount = 0;
  const titles = { tw:'新增台股', twdUs:'新增台幣複委託美股', usdUs:'新增外幣複委託美股' };

}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function addRowToModal() {

function removeRow(idx) {

// Search logic (modal)
let searchDebounce = {};
function onSymInput(idx, type) {
  const q = document.getElementById('sym-'+idx).value.trim();
  clearTimeout(searchDebounce[idx]);
  if (!q) { closeDropdown(idx); return; }
  searchDebounce[idx] = setTimeout(() => runSearch(idx, type, q), 300);
}
async function runSearch(idx, type, q) {
  let results = [];
  if (type === 'tw') results = await searchTWStocks(q);
  else results = await searchUSStocks(q);

  const drop = document.getElementById('drop-'+idx);
  if (!drop) return;
  if (!results.length) { drop.style.display = 'none'; return; }
  drop.innerHTML = '';
  results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'search-item';
    div.onmousedown = () => pickStock(idx, r.symbol, r.name || '');
    const symSpan = document.createElement('span');
    symSpan.className = 'si-symbol';
    symSpan.textContent = r.symbol;
    const nameSpan = document.createElement('span');
    nameSpan.className = 'si-name';
    nameSpan.textContent = r.name || '';
    div.appendChild(symSpan);
    div.appendChild(nameSpan);
    drop.appendChild(div);
  });
  drop.style.display = 'block';
}
async function onSymBlur(idx, type) {
  closeDropdown(idx);
  const sym = (document.getElementById('sym-'+idx)?.value || '').trim().toUpperCase();
  const nameEl = document.getElementById('name-'+idx);
  if (!sym || !nameEl || nameEl.value) return;
  if (type === 'tw') {
    const cache = await loadTWData();
    const d = cache[sym];
    if (d?.name) nameEl.value = d.name;
  } else {
    const results = await searchUSStocks(sym);
    const exact = results.find(r => r.symbol === sym);
    if (exact?.name) nameEl.value = exact.name;
  }
}
function pickStock(idx, symbol, name) {
  const symEl = document.getElementById('sym-'+idx);
  const nameEl = document.getElementById('name-'+idx);
  if (symEl) symEl.value = symbol;
  if (nameEl) nameEl.value = name;
  closeDropdown(idx);
}
function closeDropdown(idx) {
  setTimeout(() => {
    const drop = document.getElementById('drop-'+idx);
    if (drop) drop.style.display = 'none';
  }, 200);
}

async function submitModal() {
  const type = currentModalType;
  const rows = document.querySelectorAll('#add-rows .add-row');
  const toAdd = [];
  for (const row of rows) {
    const idx = row.id.replace('arow-','');
    const symbol = (document.getElementById('sym-'+idx)?.value||'').trim().toUpperCase();
    const name = (document.getElementById('name-'+idx)?.value||'').trim();
    const shares = parseFloat(document.getElementById('shares-'+idx)?.value||'0');
    const cost = parseFloat(document.getElementById('cost-'+idx)?.value||'0');
    if (!symbol || !shares || !cost) continue;
    toAdd.push({ id: Date.now()+Math.random(), symbol, name, shares, cost });
  }
  if (!toAdd.length) { showToast('請填寫完整資料'); return; }
  toAdd.forEach(h => state.portfolios[type].push(h));
  closeModal();
  renderAll();
  await saveState();
  const newSymbols = toAdd.map(h => h.symbol);
  if (type === 'tw') await fetchTWPrices(newSymbols);
  else await fetchUSPrices(newSymbols);
  renderAll();
  await saveState();
  showToast(`新增 ${toAdd.length} 筆持股`);
}

function removeHolding(type, idx) {
  const h = state.portfolios[type][idx];
  if (!h) return;
  if (!confirm(`確定刪除 ${h.symbol}${h.name ? ' ('+h.name+')' : ''} 嗎？`)) return;
  state.portfolios[type].splice(idx, 1);
  renderAll();
  saveState();
  showToast('已刪除');
}

// ─── Inline edit ──────────────────────────────────────────────────────
function editCell(span, type, idx, field, isUs) {
  if (span.querySelector('input')) return;
  const h = state.portfolios[type][idx];
  const raw = h[field];
  const step = field === 'shares' ? (isUs ? '0.00001' : '1') : '0.01';
  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'edit-input';
  input.value = raw;
  input.step = step;
  input.min = '0';
  span.textContent = '';
  span.appendChild(input);
  input.focus();
  input.select();

  function commit() {
    const v = parseFloat(input.value);
    if (v > 0 && v !== raw) {
      h[field] = v;
      renderAll();
      saveState();
      showToast('已更新');
    } else {
      renderAll();
    }
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = raw; input.blur(); }
  });
}

// ─── Toast ────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ─── Exchange rate input ───────────────────────────────────────────────
document.getElementById('rate-input').addEventListener('input', function() {
  const r = parseFloat(this.value);
  if (r > 0) { state.exchangeRate = r; renderAll(); saveState(); }
});

// ─── Pause refresh when tab hidden ────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(refreshTimer);
    refreshTimer = null;
  } else {
    fetchAllPrices();
    refreshTimer = setInterval(fetchAllPrices, REFRESH_INTERVAL);
  }
});

// ═══════════════════════════════════════════════════════════════════════
// ─── Calculator Logic ─────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════
let calcMarket = 'tw';
let calcRowId = 0;
let calcSearchDebounce = {};

function switchMarket(market) {
  calcMarket = market;
  document.querySelectorAll('.market-toggle .toggle-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.market === market)
  );
  // Clear all rows
  document.getElementById('sell-rows').innerHTML = '';
  document.getElementById('buy-rows').innerHTML = '';
  recalcCalc();
}

function buildCalcRowHTML(section, id) {
  const isTW = calcMarket === 'tw';
  const currency = isTW ? 'TWD' : 'USD';
  const stepShares = isTW ? '1' : '0.00001';
  return `
<div class="calc-row" id="cr-${section}-${id}">
  <div class="field">
    <label>股票代碼</label>
    <div class="search-wrap">
      <input type="text" id="csym-${section}-${id}" placeholder="${isTW ? '2330' : 'AAPL'}" autocomplete="off"
        oninput="onCalcSymInput('${section}',${id})" onblur="onCalcSymBlur('${section}',${id})"
        onkeydown="if(event.key==='Enter'){event.preventDefault();onCalcSymBlur('${section}',${id})}">
      <div class="search-dropdown" id="cdrop-${section}-${id}" style="display:none"></div>
      <div class="calc-not-found" id="cnf-${section}-${id}" style="display:none">查無此代碼</div>
    </div>
  </div>
  <div class="field">
    <label>公司名稱</label>
    <div class="search-wrap">
      <input type="text" id="cname-${section}-${id}" placeholder="自動帶入或搜尋" autocomplete="off"
        oninput="onCalcNameInput('${section}',${id})" onblur="onCalcNameBlur('${section}',${id})"
        onkeydown="if(event.key==='Enter'){event.preventDefault();onCalcNameBlur('${section}',${id})}">
      <div class="search-dropdown" id="cndrop-${section}-${id}" style="display:none"></div>
    </div>
  </div>
  <div class="field">
    <label>股數</label>
    <input type="number" id="cshares-${section}-${id}" placeholder="0" min="0" step="${stepShares}" oninput="recalcCalc()">
  </div>
  <div class="field">
    <label>現價 (${currency})</label>
    <input type="number" id="cprice-${section}-${id}" placeholder="自動帶入" min="0" step="0.01" oninput="recalcCalc()">
  </div>
  <div class="result-col">
    <div class="fee-detail" id="cfee-${section}-${id}"></div>
    <div class="result-val" id="cresult-${section}-${id}">—</div>
  </div>
  <button class="btn-danger" style="margin-top:18px" onclick="removeCalcRow('${section}',${id})">&#x2715;</button>
</div>`;
}

function addCalcRow(section) {
  const id = calcRowId++;
  const container = document.getElementById(section + '-rows');
  const div = document.createElement('div');
  div.innerHTML = buildCalcRowHTML(section, id);
  container.appendChild(div.firstElementChild);
}

function removeCalcRow(section, id) {
  const el = document.getElementById('cr-' + section + '-' + id);
  if (el) el.remove();
  recalcCalc();
}

// Calculator search
function onCalcSymInput(section, id) {
  const q = (document.getElementById('csym-'+section+'-'+id)?.value || '').trim();
  const key = section+'-'+id;
  clearTimeout(calcSearchDebounce[key]);
  const nfEl = document.getElementById('cnf-'+section+'-'+id);
  if (nfEl) nfEl.style.display = 'none';
  if (!q) { closeCalcDropdown(section, id); return; }
  calcSearchDebounce[key] = setTimeout(() => runCalcSearch(section, id, q), 300);
}

async function runCalcSearch(section, id, q, dropId) {
  let results = [];
  if (calcMarket === 'tw') results = await searchTWStocks(q);
  else results = await searchUSStocks(q);

  const drop = document.getElementById(dropId || ('cdrop-'+section+'-'+id));
  if (!drop) return;
  if (!results.length) { drop.style.display = 'none'; return; }
  drop.innerHTML = '';
  results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'search-item';
    div.onmousedown = () => pickCalcStock(section, id, r.symbol, r.name || '');
    const symSpan = document.createElement('span');
    symSpan.className = 'si-symbol';
    symSpan.textContent = r.symbol;
    const nameSpan = document.createElement('span');
    nameSpan.className = 'si-name';
    nameSpan.textContent = r.name || '';
    div.appendChild(symSpan);
    div.appendChild(nameSpan);
    drop.appendChild(div);
  });
  drop.style.display = 'block';
}

async function onCalcSymBlur(section, id) {
  closeCalcDropdown(section, id);
  const sym = (document.getElementById('csym-'+section+'-'+id)?.value || '').trim().toUpperCase();
  if (!sym) return;
  const symEl = document.getElementById('csym-'+section+'-'+id);
  if (symEl) symEl.value = sym;
  await fetchCalcPrice(section, id, sym);
  // Auto-fill name if empty
  const nameEl = document.getElementById('cname-'+section+'-'+id);
  if (nameEl && !nameEl.value) {
    if (calcMarket === 'tw') {
      const cache = await loadTWData();
      const d = cache[sym];
      if (d?.name) nameEl.value = d.name;
    } else {
      const results = await searchUSStocks(sym);
      const exact = results.find(r => r.symbol === sym);
      if (exact?.name) nameEl.value = exact.name;
    }
  }
}

async function fetchCalcPrice(section, id, sym) {
  const priceEl = document.getElementById('cprice-'+section+'-'+id);
  const nameEl = document.getElementById('cname-'+section+'-'+id);
  const nfEl = document.getElementById('cnf-'+section+'-'+id);
  if (!priceEl) return;

  // Check existing prices cache first
  if (prices[sym]) {
    priceEl.value = prices[sym];
    if (nfEl) nfEl.style.display = 'none';
    // Also fill name if empty
    if (nameEl && !nameEl.value) fillCalcName(section, id, sym);
    recalcCalc();
    return;
  }

  if (calcMarket === 'tw') {
    const cache = await loadTWData();
    const d = cache[sym];
    if (d && d.price) {
      prices[sym] = d.price;
      priceEl.value = d.price;
      if (nfEl) nfEl.style.display = 'none';
      if (nameEl && !nameEl.value && d.name) nameEl.value = d.name;
    } else {
      if (nfEl) nfEl.style.display = 'block';
    }
  } else {
    try {
      const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FINNHUB_KEY}`, { signal: AbortSignal.timeout(8000) });
      const data = await res.json();
      if (data.c && data.c > 0) {
        prices[sym] = data.c;
        priceEl.value = data.c;
        if (nfEl) nfEl.style.display = 'none';
        if (nameEl && !nameEl.value) fillCalcName(section, id, sym);
      } else {
        if (nfEl) nfEl.style.display = 'block';
      }
    } catch {
      if (nfEl) nfEl.style.display = 'block';
    }
  }
  recalcCalc();
}

async function fillCalcName(section, id, sym) {
  const nameEl = document.getElementById('cname-'+section+'-'+id);
  if (!nameEl || nameEl.value) return;
  if (calcMarket === 'tw') {
    const cache = await loadTWData();
    if (cache[sym]?.name) nameEl.value = cache[sym].name;
  } else {
    const results = await searchUSStocks(sym);
    const exact = results.find(r => r.symbol === sym);
    if (exact?.name) nameEl.value = exact.name;
  }
}

function pickCalcStock(section, id, symbol, name) {
  const symEl = document.getElementById('csym-'+section+'-'+id);
  const nameEl = document.getElementById('cname-'+section+'-'+id);
  if (symEl) symEl.value = symbol;
  if (nameEl && name) nameEl.value = name;
  closeCalcDropdown(section, id);
  fetchCalcPrice(section, id, symbol);
}

function closeCalcDropdown(section, id) {
  setTimeout(() => {
    const drop = document.getElementById('cdrop-'+section+'-'+id);
    if (drop) drop.style.display = 'none';
    const ndrop = document.getElementById('cndrop-'+section+'-'+id);
    if (ndrop) ndrop.style.display = 'none';
  }, 200);
}

// Calculator name-based search
function onCalcNameInput(section, id) {
  const q = (document.getElementById('cname-'+section+'-'+id)?.value || '').trim();
  const key = 'n-'+section+'-'+id;
  clearTimeout(calcSearchDebounce[key]);
  if (!q) { closeCalcDropdown(section, id); return; }
  calcSearchDebounce[key] = setTimeout(() => runCalcSearch(section, id, q, 'cndrop-'+section+'-'+id), 300);
}

function onCalcNameBlur(section, id) {
  closeCalcDropdown(section, id);
}

// Fee calculation
function calcFees(section, price, shares) {
  const amt = price * shares;
  if (calcMarket === 'tw') {
    const fee = Math.round(amt * 0.001425 * 0.28);
    const tax = section === 'sell' ? Math.round(amt * 0.003) : 0;
    const net = section === 'sell' ? amt - fee - tax : amt + fee;
    return { amt, fee, tax, net };
  } else {
    const fee = amt * 0.0008;
    const net = section === 'sell' ? amt - fee : amt + fee;
    return { amt, fee, tax: 0, net };
  }
}

function recalcCalc() {
  const isTW = calcMarket === 'tw';
  const dec = isTW ? 0 : 2;
  const currency = isTW ? '' : '$';
  const suffix = isTW ? ' 元' : '';
  let sellTotal = 0;
  let buyTotal = 0;

  // Process sell rows
  document.querySelectorAll('#sell-rows .calc-row').forEach(row => {
    const id = row.id.replace('cr-sell-','');
    const price = parseFloat(document.getElementById('cprice-sell-'+id)?.value) || 0;
    const shares = parseFloat(document.getElementById('cshares-sell-'+id)?.value) || 0;
    const resultEl = document.getElementById('cresult-sell-'+id);
    const feeEl = document.getElementById('cfee-sell-'+id);
    if (price > 0 && shares > 0) {
      const { fee, tax, net } = calcFees('sell', price, shares);
      sellTotal += net;
      if (resultEl) resultEl.textContent = currency + fmtNum(net, dec) + suffix;
      if (feeEl) {
        if (isTW) feeEl.textContent = `手續費 ${fmtNum(fee)} / 證交稅 ${fmtNum(tax)}`;
        else feeEl.textContent = `手續費 $${fmtNum(fee, 2)}`;
      }
    } else {
      if (resultEl) resultEl.textContent = '—';
      if (feeEl) feeEl.textContent = '';
    }
  });

  // Process buy rows
  document.querySelectorAll('#buy-rows .calc-row').forEach(row => {
    const id = row.id.replace('cr-buy-','');
    const price = parseFloat(document.getElementById('cprice-buy-'+id)?.value) || 0;
    const shares = parseFloat(document.getElementById('cshares-buy-'+id)?.value) || 0;
    const resultEl = document.getElementById('cresult-buy-'+id);
    const feeEl = document.getElementById('cfee-buy-'+id);
    if (price > 0 && shares > 0) {
      const { fee, net } = calcFees('buy', price, shares);
      buyTotal += net;
      if (resultEl) resultEl.textContent = currency + fmtNum(net, dec) + suffix;
      if (feeEl) {
        if (isTW) feeEl.textContent = `手續費 ${fmtNum(fee)}`;
        else feeEl.textContent = `手續費 $${fmtNum(fee, 2)}`;
      }
    } else {
      if (resultEl) resultEl.textContent = '—';
      if (feeEl) feeEl.textContent = '';
    }
  });

  // Totals
  document.getElementById('sell-total-val').textContent = currency + fmtNum(sellTotal, dec) + suffix;
  document.getElementById('buy-total-val').textContent = currency + fmtNum(buyTotal, dec) + suffix;

  // Summary
  const diff = sellTotal - buyTotal;
  const diffEl = document.getElementById('calc-diff');
  const msgEl = document.getElementById('calc-msg');

  if (sellTotal === 0 && buyTotal === 0) {
    diffEl.textContent = '—';
    diffEl.className = 'calc-summary-value';
    msgEl.textContent = '';
  } else {
    const sign = diff >= 0 ? '+' : '';
    diffEl.textContent = sign + currency + fmtNum(diff, dec) + suffix;
    diffEl.className = 'calc-summary-value ' + (diff >= 0 ? 'loss' : 'profit');
    if (diff >= 0) {
      msgEl.innerHTML = `<span class="loss">資金有餘 +${currency}${fmtNum(diff, dec)}${suffix}</span>`;
    } else {
      msgEl.innerHTML = `<span class="profit">尚需補入 ${currency}${fmtNum(Math.abs(diff), dec)}${suffix}</span>`;
    }
  }
}

// Import from portfolio
function importFromPortfolio() {
  const sellContainer = document.getElementById('sell-rows');
  let imported = 0;

  function addImportRow(symbol, shares, name) {
    const id = calcRowId++;
    const div = document.createElement('div');
    div.innerHTML = buildCalcRowHTML('sell', id);
    sellContainer.appendChild(div.firstElementChild);
    const symEl = document.getElementById('csym-sell-'+id);
    const sharesEl = document.getElementById('cshares-sell-'+id);
    const nameEl = document.getElementById('cname-sell-'+id);
    if (symEl) symEl.value = symbol;
    if (sharesEl) sharesEl.value = shares;
    if (nameEl && name) nameEl.value = name;
    // Try to fill price from cache
    if (prices[symbol]) {
      const priceEl = document.getElementById('cprice-sell-'+id);
      if (priceEl) priceEl.value = prices[symbol];
    } else {
      fetchCalcPrice('sell', id, symbol);
    }
    imported++;
  }

  if (calcMarket === 'tw') {
    state.portfolios.tw.forEach(h => addImportRow(h.symbol, h.shares, h.name));
  } else {
    state.portfolios.twdUs.forEach(h => addImportRow(h.symbol, h.shares, h.name));
    state.portfolios.usdUs.forEach(h => addImportRow(h.symbol, h.shares, h.name));
  }

  if (imported > 0) {
    showToast(`已匯入 ${imported} 筆持股`);
    recalcCalc();
  } else {
    showToast('目前無可匯入的持股');
  }
}

// ═══════════════════════════════════════════════════════════════════════
// ─── Notes Logic ──────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════
let editingNoteId = null;

function showNoteEditor(noteId) {
  const editor = document.getElementById('note-editor');
  const input = document.getElementById('note-input');
  editor.style.display = 'block';
  if (noteId != null) {
    const note = (state.notes || []).find(n => n.id === noteId);
    if (note) { input.value = note.text; editingNoteId = noteId; }
  } else {
    input.value = '';
    editingNoteId = null;
  }
  input.focus();
}

function cancelNoteEditor() {
  document.getElementById('note-editor').style.display = 'none';
  document.getElementById('note-input').value = '';
  editingNoteId = null;
}

function saveNote() {
  const text = document.getElementById('note-input').value.trim();
  if (!text) { showToast('請輸入內容'); return; }
  if (!state.notes) state.notes = [];

  if (editingNoteId != null) {
    const note = state.notes.find(n => n.id === editingNoteId);
    if (note) { note.text = text; note.updatedAt = Date.now(); }
    showToast('已更新備忘');
  } else {
    state.notes.unshift({ id: Date.now().toString(36) + Math.random().toString(36).slice(2), text, createdAt: Date.now(), updatedAt: null });
    showToast('已新增備忘');
  }

  cancelNoteEditor();
  renderNotes();
  saveState();
}

function deleteNote(noteId) {
  if (!state.notes) return;
  if (!confirm('確定刪除這則備忘錄嗎？')) return;
  state.notes = state.notes.filter(n => n.id !== noteId);
  renderNotes();
  saveState();
  showToast('已刪除');
}

function fmtDate(ts) {
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${y}/${m}/${day} ${h}:${min}`;
}

function renderNotes() {
  const container = document.getElementById('notes-list');
  const notes = state.notes || [];
  if (!notes.length) {
    container.innerHTML = '<div class="note-empty">尚無備忘錄，點擊「新增備忘」開始記錄</div>';
    return;
  }
  container.innerHTML = '<div class="notes-grid">' + notes.map(n => {
    const dateStr = n.updatedAt ? `${fmtDate(n.createdAt)}（已編輯 ${fmtDate(n.updatedAt)}）` : fmtDate(n.createdAt);
    const escapedText = n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="note-card">
      <div class="note-date">${dateStr}</div>
      <div class="note-body">${escapedText}</div>
      <div class="note-actions">
        <button class="btn-ghost" style="padding:4px 10px;font-size:12px" onclick="showNoteEditor('${n.id}')">編輯</button>
        <button class="btn-danger" style="padding:4px 10px;font-size:12px" onclick="deleteNote('${n.id}')">刪除</button>
      </div>
    </div>`;
  }).join('') + '</div>';
}

// ─── Init ──────────────────────────────────────────────────────────────
(async function init() {
  _pwd = sessionStorage.getItem('__sk') || null;
  if (_pwd) sessionStorage.removeItem('__sk');

  await loadState();
  document.getElementById('rate-input').value = state.exchangeRate;
  renderAll();
  renderNotes();
  await fetchAllPrices();
  refreshTimer = setInterval(fetchAllPrices, REFRESH_INTERVAL);
})();
</script>
